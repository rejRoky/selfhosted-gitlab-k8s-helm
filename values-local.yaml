# ──────────────────────────────────────────────────────────────
# GitLab Helm — LOCAL / OFFLINE values
#
# Use this when you have NO public domain or public IP.
# Prerequisites: run ./deploy-deps.sh first to provision
#   PostgreSQL, Redis, and MinIO as external services.
#
# Usage:
#   ./deploy.sh --domain my.lan --ip 192.168.1.10 \
#               --email admin@local.lan \
#               --values-file values-local.yaml
#
# Add to /etc/hosts on any client:
#   192.168.1.10  gitlab.my.lan registry.my.lan minio.my.lan
# ──────────────────────────────────────────────────────────────

global:
  hosts:
    domain: my.lan
    https: true
    externalIP: ""              # Set via --set or --ip flag in deploy.sh

  ingress:
    configureCertmanager: false
    class: gitlab-nginx
    tls:
      enabled: true
      secretName: gitlab-tls-self-signed

  certmanager:
    install: false

  time_zone: UTC
  edition: ce

  smtp:
    enabled: false

  email:
    display_name: GitLab
    from: "gitlab@my.lan"
    reply_to: ""

  kas:
    enabled: false
  spamcheck:
    enabled: false

  shell:
    port: 32222    # Must be in NodePort range (30000-32767) for minikube

  monitoring:
    enabled: false

  # ── External PostgreSQL (deployed by deploy-deps.sh) ─────────
  psql:
    host: gitlab-postgresql
    port: 5432
    username: gitlab
    database: gitlabhq_production
    password:
      secret: gitlab-postgresql
      key: password

  # ── External Redis (deployed by deploy-deps.sh) ──────────────
  redis:
    host: gitlab-redis-master
    auth:
      enabled: true
      secret: gitlab-redis
      key: redis-password

  # ── External object storage — MinIO (deployed by deploy-deps.sh)
  appConfig:
    # Consolidated object storage — individual items inherit this connection
    object_store:
      enabled: true
      proxy_download: true
      connection:
        secret: gitlab-object-store
        key: connection
    lfs:
      bucket: gitlab-lfs
    artifacts:
      bucket: gitlab-artifacts
    uploads:
      bucket: gitlab-uploads
    packages:
      bucket: gitlab-packages
    backups:
      bucket: gitlab-backup
      tmpBucket: gitlab-tmp
      # Backups require their own connection reference
      connection:
        secret: gitlab-object-store
        key: connection

# ── Disable removed bundled components ───────────────────────
postgresql:
  install: false

redis:
  install: false

minio:
  enabled: false

# ── nginx-ingress — NodePort (no cloud LoadBalancer) ─────────
nginx-ingress:
  enabled: true
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      type: NodePort
      nodePorts:
        http: 30080
        https: 30443

# ── Container Registry ────────────────────────────────────────
registry:
  enabled: true
  hpa:
    minReplicas: 1
    maxReplicas: 1
  storage:
    secret: gitlab-registry-storage
    key: config
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# ── GitLab application components ────────────────────────────
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    workerProcesses: 2
    resources:
      requests:
        cpu: 300m
        memory: 1.5G
      limits:
        memory: 3G

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1G

  gitaly:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 200Mi

  toolbox:
    replicas: 1
    backups:
      objectStorage:
        config:
          secret: gitlab-object-store
          key: connection
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

# ── GitLab Runner (optional) ──────────────────────────────────
gitlab-runner:
  enabled: false
