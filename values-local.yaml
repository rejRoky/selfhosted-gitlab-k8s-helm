# ──────────────────────────────────────────────────────────────
# GitLab Helm — LOCAL / OFFLINE values
#
# Use this when you have NO public domain or public IP.
# Access GitLab via NodePort on the machine's LAN IP.
# TLS is self-signed (browser will show a warning — that's OK
# for local use).
#
# Usage:
#   ./deploy.sh --domain my.lan --ip 192.168.1.10 \
#               --email admin@local.lan \
#               --values-file values-local.yaml
#
# Add to /etc/hosts on any client machine:
#   192.168.1.10  gitlab.my.lan registry.my.lan minio.my.lan
# ──────────────────────────────────────────────────────────────

global:
  hosts:
    domain: my.lan            # Change to your LAN hostname or hostname.local
    https: true
    externalIP: ""            # Set to your machine's LAN IP, e.g. 192.168.1.10

  ingress:
    configureCertmanager: false   # No Let's Encrypt for local install
    class: gitlab-nginx
    tls:
      enabled: true
      secretName: gitlab-tls-self-signed

  # Disable cert-manager; we use a self-signed cert secret
  certmanager:
    install: false

  # No SMTP needed for local dev
  smtp:
    enabled: false

  email:
    display_name: GitLab
    from: "gitlab@my.lan"
    reply_to: ""

  minio:
    enabled: true

  kas:
    enabled: false

  spamcheck:
    enabled: false

  shell:
    port: 2222              # Avoid needing root for port 22 in NodePort mode

  monitoring:
    enabled: false

# ── nginx-ingress — NodePort (no cloud LoadBalancer) ─────────
nginx-ingress:
  enabled: true
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      type: NodePort
      nodePorts:
        http: 30080
        https: 30443
    # Allow ports < 1024 in the container (needed for ssh shell)
    containerPort:
      http: 8080
      https: 8443

# ── GitLab components (single-replica, minimal resources) ────
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    workerProcesses: 2
    resources:
      requests:
        cpu: 300m
        memory: 1.5G
      limits:
        memory: 3G

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1G

  gitaly:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 200Mi

  toolbox:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    service:
      type: NodePort
      nodePort: 32222    # SSH clone: git clone ssh://git@<IP>:32222/group/repo.git
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

registry:
  enabled: true
  hpa:
    minReplicas: 1
    maxReplicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

postgresql:
  install: true
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 200m
        memory: 256Mi

redis:
  install: true
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

minio:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

gitlab-runner:
  enabled: false
