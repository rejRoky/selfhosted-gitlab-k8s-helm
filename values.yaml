# ──────────────────────────────────────────────────────────────
# GitLab Helm Chart — self-hosted production values
# Chart: https://charts.gitlab.io/  (gitlab/gitlab)
#
# Prerequisites: run ./deploy-deps.sh first to provision
#   PostgreSQL, Redis, and MinIO as external services.
#
# Replace every occurrence of "example.com" with your real domain.
# Replace "your-email@example.com" with your real email (Let's Encrypt).
# Set global.hosts.externalIP to the public IP of your node.
# ──────────────────────────────────────────────────────────────

global:
  # ── Domains ──────────────────────────────────────────────────
  hosts:
    domain: example.com          # GitLab will live at gitlab.example.com
    https: true
    externalIP: ""               # Public IP of the Kubernetes node

  # ── Ingress ──────────────────────────────────────────────────
  ingress:
    configureCertmanager: true
    class: gitlab-nginx
    annotations:
      kubernetes.io/tls-acme: "true"

  # ── Cert-manager / ACME ──────────────────────────────────────
  certmanager:
    install: true

  time_zone: UTC
  edition: ce

  # ── Email (SMTP) ──────────────────────────────────────────────
  smtp:
    enabled: false
    # address: smtp.gmail.com
    # port: 587
    # user_name: "user@gmail.com"
    # password:
    #   secret: gitlab-smtp-password
    #   key: password
    # authentication: plain
    # starttls_auto: true

  email:
    display_name: GitLab
    from: ""
    reply_to: ""

  kas:
    enabled: false
  spamcheck:
    enabled: false

  shell:
    port: 22

  monitoring:
    enabled: false

  # ── External PostgreSQL (deployed by deploy-deps.sh) ─────────
  psql:
    host: gitlab-postgresql
    port: 5432
    username: gitlab
    database: gitlabhq_production
    password:
      secret: gitlab-postgresql
      key: password

  # ── External Redis (deployed by deploy-deps.sh) ──────────────
  redis:
    host: gitlab-redis-master
    auth:
      enabled: true
      secret: gitlab-redis
      key: redis-password

  # ── External object storage — MinIO (deployed by deploy-deps.sh)
  appConfig:
    # Consolidated object storage — individual items inherit this connection
    object_store:
      enabled: true
      proxy_download: true
      connection:
        secret: gitlab-object-store
        key: connection
    lfs:
      bucket: gitlab-lfs
    artifacts:
      bucket: gitlab-artifacts
    uploads:
      bucket: gitlab-uploads
    packages:
      bucket: gitlab-packages
    backups:
      bucket: gitlab-backup
      tmpBucket: gitlab-tmp
      connection:
        secret: gitlab-object-store
        key: connection

# ── Let's Encrypt issuer ──────────────────────────────────────
certmanager-issuer:
  email: your-email@example.com

# ── Disable removed bundled components ───────────────────────
postgresql:
  install: false

redis:
  install: false

minio:
  enabled: false

# ── nginx-ingress (bundled) ───────────────────────────────────
nginx-ingress:
  enabled: true
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      type: LoadBalancer

# ── Container Registry ────────────────────────────────────────
registry:
  enabled: true
  hpa:
    minReplicas: 1
    maxReplicas: 1
  storage:
    secret: gitlab-registry-storage
    key: config
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# ── GitLab application components ────────────────────────────
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    workerProcesses: 2
    resources:
      requests:
        cpu: 300m
        memory: 1.5G
      limits:
        memory: 3G

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1G

  gitaly:
    persistence:
      enabled: true
      size: 50Gi
    resources:
      requests:
        cpu: 100m
        memory: 200Mi

  toolbox:
    replicas: 1
    backups:
      objectStorage:
        config:
          secret: gitlab-object-store
          key: connection
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

# ── GitLab Runner (optional) ──────────────────────────────────
gitlab-runner:
  enabled: false
